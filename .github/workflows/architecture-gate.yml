name: architecture-gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-fr0:
    name: FR-0 V0-V8 Architecture Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip jsonschema

      - name: Validate architecture V0-V8
        run: python -m src.fr0 validate

      - name: Run automated tests
        run: python -m unittest discover -s tests -v

      - name: Generate deterministic lock
        run: python -m src.fr0 lock

      - name: Verify clean generated artifacts
        run: |
          git diff --exit-code \
            baseline/AB-FR0-001.lock.json \
            reports/validation-v0-v8.json
